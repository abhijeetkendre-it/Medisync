<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Portal | Medisync</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .gradient-text {
            background: linear-gradient(90deg, #0284c7, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="bg-slate-100 flex items-center justify-center min-h-screen px-6">

    <div class="text-center w-full max-w-5xl">

        <!-- LOGO -->
        <div class="flex justify-center items-center gap-2 mb-6">
            <img src="medisync-logo.png" class="w-10 h-10">
            <span class="text-2xl font-bold gradient-text">MediSync</span>
        </div>

        <h1 class="text-3xl font-bold mb-2">Choose Your Portal</h1>
        <p class="text-slate-500 mb-10">
            Please select how you would like to continue
        </p>

        <!-- CARDS -->
        <div class="grid md:grid-cols-2 gap-8">

            <!-- PATIENT -->
            <div class="bg-white p-8 rounded-2xl shadow-lg hover:shadow-xl transition">

                <div
                    class="w-16 h-16 mx-auto mb-6 bg-emerald-100 text-emerald-600 flex items-center justify-center rounded-xl text-2xl">
                    <i class="fa-solid fa-heart-pulse"></i>
                </div>

                <h2 class="text-xl font-bold mb-2">Patient Mode</h2>
                <p class="text-slate-500 mb-6">
                    Access your reports, monitor health, and connect with doctors.
                </p>

                <button onclick="goPatient()"
                    class="w-full bg-emerald-500 text-white py-3 rounded-xl font-semibold hover:bg-emerald-600 transition">
                    Enter Portal →
                </button>
            </div>


            <!-- DOCTOR -->
            <div class="bg-white p-8 rounded-2xl shadow-lg hover:shadow-xl transition">

                <div
                    class="w-16 h-16 mx-auto mb-6 bg-sky-100 text-sky-600 flex items-center justify-center rounded-xl text-2xl">
                    <i class="fa-solid fa-user-doctor"></i>
                </div>

                <h2 class="text-xl font-bold mb-2">Doctor Mode</h2>
                <p class="text-slate-500 mb-6">
                    Manage patients, view insights, and provide consultations.
                </p>

                <button onclick="goDoctor()"
                    class="w-full bg-sky-600 text-white py-3 rounded-xl font-semibold hover:bg-sky-700 transition">
                    Enter Portal →
                </button>
            </div>

        </div>

        <!-- FOOTER -->

        <p class="text-sm text-slate-400 mt-10">
            © 2026 Medisync | <span class="text-emerald-400 font-semibold">Team A.S.I.A. Core</span>
        </p>
    </div>

    <!-- SCRIPT -->
    <script>
        function goPatient() {
            window.location.href = "login.html";
        }

        function goDoctor() {
            window.location.href = "doctor-login.html";
        }
    </script>

</body>

</html>

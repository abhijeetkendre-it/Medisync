<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Medisync</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .gradient-text {
      background: linear-gradient(90deg, #0284c7, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .error {
      color: red;
      font-size: 12px;
    }
  </style>
</head>

<body class="bg-slate-50 flex items-center justify-center min-h-screen px-6">

  <div class="max-w-6xl w-full grid md:grid-cols-2 bg-white rounded-3xl shadow-xl overflow-hidden">

    <!-- LEFT -->
    <div class="hidden md:flex flex-col justify-center p-12 bg-gradient-to-br from-emerald-100 to-sky-100">
      <h1 class="text-4xl font-bold mb-4">
        Join <span class="gradient-text">Medisync</span>
      </h1>
      <p class="text-slate-600 text-lg">
        Create your account and experience smart remote healthcare monitoring powered by AI.
      </p>
    </div>

    <!-- RIGHT -->
    <div class="p-8 md:p-12">

      <!-- LOGO -->
      <div class="flex items-center gap-2 mb-8">
        <img src="medisync-logo.png" class="w-10 h-10">
        <span class="text-2xl font-bold gradient-text">Medisync</span>
      </div>

      <h2 class="text-2xl font-bold mb-6">Create Account</h2>

      <form id="signupForm" class="space-y-5" onsubmit="handleSignup(event)">

        <!-- ROLE -->
        <div>
          <label class="text-sm text-slate-600">Register As <span class="text-red-500">*</span></label>
          <select id="role" required
            class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-400">
            <option value="">Select Role</option>
            <option>Patient</option>
            <option>Doctor</option>
          </select>
        </div>

        <!-- NAME -->
        <div>
          <label class="text-sm text-slate-600">Full Name <span class="text-red-500">*</span></label>
          <input type="text" id="name" required placeholder="Enter your name"
            class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-400">
          <p id="nameError" class="error"></p>
        </div>

        <!-- EMAIL -->
        <div>
          <label class="text-sm text-slate-600">Email <span class="text-red-500">*</span></label>
          <input type="email" id="email" required placeholder="Enter your email"
            class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sky-400">
        </div>

        <!-- PASSWORD -->
        <div class="relative">
          <label class="text-sm text-slate-600">Password <span class="text-red-500">*</span></label>
          <input type="password" id="password" required placeholder="Create a password"
            class="w-full mt-1 px-4 py-3 pr-12 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-400">

          <i id="eyeIcon1" onclick="togglePassword('password','eyeIcon1')"
            class="fa-solid fa-eye absolute right-4 top-[38px] cursor-pointer text-slate-500"></i>

          <p id="passError" class="error"></p>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="relative">
          <label class="text-sm text-slate-600">Confirm Password <span class="text-red-500">*</span></label>
          <input type="password" id="confirmPassword" required placeholder="Confirm password"
            class="w-full mt-1 px-4 py-3 pr-12 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sky-400">

          <i id="eyeIcon2" onclick="togglePassword('confirmPassword','eyeIcon2')"
            class="fa-solid fa-eye absolute right-4 top-[38px] cursor-pointer text-slate-500"></i>

          <p id="confirmError" class="error"></p>
        </div>

        <button type="submit"
          class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold hover:bg-emerald-600 transition shadow-lg">
          Create Account
        </button>

      </form>

      <!-- OTP Form (Hidden by default) -->
      <div id="otpSection" class="hidden mt-6">
        <h3 class="text-xl font-bold mb-4">Verify Your Email</h3>
        <p class="text-sm text-slate-600 mb-6">We've sent a 6-digit OTP to your email address.</p>
        <form class="space-y-5" onsubmit="handleVerifySignup(event)">
          <div>
            <label class="text-sm text-slate-600">Enter OTP <span class="text-red-500">*</span></label>
            <input type="text" id="otpInput" required placeholder="123456" maxlength="6"
              class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-400 tracking-widest text-center text-lg font-bold">
          </div>
          <button type="submit"
            class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold hover:bg-emerald-600 transition shadow-lg">
            Verify OTP & Create Account
          </button>
        </form>
      </div>

      <p class="text-sm text-slate-500 mt-6 text-center">
        Already have an account?
        <a href="login.html" class="text-sky-600 font-semibold hover:underline">Sign In</a>
      </p>

    </div>

  </div>

  <script>
    window.togglePassword = function (fieldId, iconId) {
      const input = document.getElementById(fieldId);
      const icon = document.getElementById(iconId);

      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
      } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
      }
    }

    window.handleSignup = async function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const role = document.getElementById("role").value;

      let valid = true;

      // NAME CHECK
      if (name.split(" ").length < 2) {
        document.getElementById("nameError").innerText = "Enter First & Last Name";
        valid = false;
      } else {
        document.getElementById("nameError").innerText = "";
      }

      // PASSWORD CHECK
      const regex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;
      if (!regex.test(password)) {
        document.getElementById("passError").innerText =
          "Min 8 chars, 1 uppercase, 1 number, 1 special char required";
        valid = false;
      } else {
        document.getElementById("passError").innerText = "";
      }

      // CONFIRM CHECK
      if (password !== confirmPassword) {
        document.getElementById("confirmError").innerText = "Passwords do not match";
        valid = false;
      } else {
        document.getElementById("confirmError").innerText = "";
      }

      if (!valid) return;

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role })
        });

        const data = await response.json();

        if (response.ok) {
          if (data.requireOtp) {
            document.getElementById("signupForm").classList.add("hidden");
            document.getElementById("otpSection").classList.remove("hidden");
            window.registeredEmail = email;
            window.registeredRole = role;
          } else {
            alert("Signup successful!");
            window.location.replace(role === 'Doctor' ? "doctor-login.html" : "login.html");
          }
        } else {
          alert(data.message || "Error signing up.");
        }
      } catch (error) {
        console.error("Error signing up:", error);
        alert("Server Error: " + error.message);
      }
    }

    window.handleVerifySignup = async function (e) {
      e.preventDefault();
      const otp = document.getElementById("otpInput").value.trim();
      
      try {
        const response = await fetch('/api/auth/verify-register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: window.registeredEmail, otp })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          alert("Account created successfully!");
          window.location.replace(window.registeredRole === 'Doctor' ? "doctor-login.html" : "login.html");
        } else {
          alert(data.message || "Invalid OTP");
        }
      } catch (error) {
        console.error("Error verifying OTP:", error);
        alert("Server Error: " + error.message);
      }
    }
  </script>

</body>

</html>
